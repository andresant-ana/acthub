name: Backend Build

on:
  push:
    paths:
      - 'src/backend/**'
  pull_request:
    paths:
      - 'src/backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/backend/ActHub.sln

      - name: Build
        run: dotnet build src/backend/ActHub.sln --no-restore
